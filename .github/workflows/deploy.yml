name: Build, Push & Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build & push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./FRONTEND
        push: true
        tags: nerisha111/meddiagnostic:frontend
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & push backend
      uses: docker/build-push-action@v5
      with:
        context: ./BACKEND
        push: true
        tags: nerisha111/meddiagnostic:backend
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

    - name: Restart Kubernetes deployments
      run: |
        kubectl rollout restart deployment nginx-frontend -n default
        kubectl rollout restart deployment django-backend -n default
        
        kubectl rollout status deployment nginx-frontend -n default
        kubectl rollout status deployment django-backend -n default